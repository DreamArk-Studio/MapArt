# MapArk 配置文件

# 语言设置 (zh_cn: 简体中文, en_us: English)
language: ${mapart.language}

# 最大图片宽度（像素）
max-image-width: 2048

# 最大图片高度（像素）
max-image-height: 2048

# 地图尺寸（像素），标准地图为 128x128
map-size: 128

# 是否启用异步处理
async-processing: true

# 最大并发任务数
max-concurrent-tasks: 4

# Web 上传服务器配置
web-server:
  enabled: true
  host: "0.0.0.0"
  port: 8080
  # 上传页面地址（用于给玩家显示的链接）
  # 默认示例使用 HTTP，便于本机/内网调试；正式域名可改成 https://yourdomain
  public-url: "http://127.0.0.1:8080"
